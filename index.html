<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic 3D Word Tree</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevent scrolling */
            background-color: #ffffff; /* White background as requested */
            font-family: 'Inter', sans-serif;
            user-select: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            color: #333;
            letter-spacing: 2px;
            font-weight: bold;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .instructions {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            pointer-events: none;
        }
    </style>
    <!-- Load Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="loading">GROWING TREE...</div>
    <div id="canvas-container"></div>
    <div class="instructions">Move mouse to rotate the view</div>

    <script>
        const container = document.getElementById('canvas-container');
        const loadingScreen = document.getElementById('loading');

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        scene.fog = new THREE.FogExp2(0xffffff, 0.005); // Soft fade into background

        // Camera setup
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.set(0, 30, 80);
        camera.lookAt(0, 20, 0);

        // Renderer setup
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Optimize for high DPI
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // Interactive Tree Group
        const treeGroup = new THREE.Group();
        scene.add(treeGroup);

        // Ambient Light
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        // Sun Light (Directional)
        const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
        sunLight.position.set(50, 100, 50);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 10;
        sunLight.shadow.camera.far = 200;
        sunLight.shadow.camera.left = -50;
        sunLight.shadow.camera.right = 50;
        sunLight.shadow.camera.top = 50;
        sunLight.shadow.camera.bottom = -50;
        sunLight.shadow.bias = -0.001;
        scene.add(sunLight);

        // Ground Plane (to receive shadows)
        const planeGeometry = new THREE.PlaneGeometry(500, 500);
        const planeMaterial = new THREE.ShadowMaterial({ opacity: 0.1 }); // Subtle shadow
        const plane = new THREE.Mesh(planeGeometry, planeMaterial);
        plane.rotation.x = -Math.PI / 2;
        plane.position.y = 0;
        plane.receiveShadow = true;
        scene.add(plane);

        const leafWords = ["Tauqir", "loves", "you", "Samiha"];
        const leafColors = ["#1b5e20", "#2e7d32", "#388e3c", "#4caf50", "#81c784"];
        const leafMaterials = [];

        // Generate canvas-based textures for the words
        function createTextMaterial(text, color) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;  // Increased resolution for readability
            canvas.height = 128; 
            const context = canvas.getContext('2d');
            
            // Transparent background
            context.clearRect(0, 0, canvas.width, canvas.height);
            
            // Text styling - Larger, bolder font
            context.font = '900 80px "Inter", "Courier New", monospace';
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            
            // Add a thick white outline to make text highly legible against overlap
            context.lineWidth = 12;
            context.strokeStyle = 'rgba(255, 255, 255, 0.9)';
            context.strokeText(text, canvas.width / 2, canvas.height / 2 + 5);

            // Fill color
            context.fillStyle = color;
            context.fillText(text, canvas.width / 2, canvas.height / 2 + 5);

            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;

            // Use DoubleSide so leaves are visible from all angles
            return new THREE.MeshLambertMaterial({ 
                map: texture, 
                transparent: true, 
                side: THREE.DoubleSide,
                alphaTest: 0.1 // Clean edges
            });
        }

        // Pre-generate materials
        leafWords.forEach(word => {
            leafColors.forEach(color => {
                leafMaterials.push(createTextMaterial(word, color));
            });
        });

        const trunkMaterial = new THREE.MeshLambertMaterial({ color: 0x4A2F1D }); // Realistic dark wood
        const activeLeaves = [];
        const fallingLeaves = [];
        const leafSpawnPoints = [];

        // Cylinder geometry factory to reuse geometries of similar sizes if possible, 
        // but for a smooth tree we will generate precise cylinders
        function createBranchCylinder(startPoint, endPoint, radiusStart, radiusEnd) {
            const distance = startPoint.distanceTo(endPoint);
            // 8 radial segments is enough for smooth enough branches from a distance
            const geometry = new THREE.CylinderGeometry(radiusEnd, radiusStart, distance, 8);
            
            // Translate origin to bottom of cylinder to make placement easy
            geometry.translate(0, distance / 2, 0); 
            
            const mesh = new THREE.Mesh(geometry, trunkMaterial);
            mesh.castShadow = true;
            mesh.receiveShadow = true;

            // Position at start
            mesh.position.copy(startPoint);

            // Orient towards end point
            const direction = new THREE.Vector3().subVectors(endPoint, startPoint).normalize();
            const up = new THREE.Vector3(0, 1, 0);
            const quaternion = new THREE.Quaternion().setFromUnitVectors(up, direction);
            mesh.quaternion.copy(quaternion);

            return mesh;
        }

        function buildTree(startPoint, direction, length, radius, depth) {
            const endPoint = new THREE.Vector3().copy(startPoint).add(direction.clone().multiplyScalar(length));
            
            // Calculate ending radius (tapering)
            const radiusEnd = Math.max(0.1, radius * 0.65);
            
            const branch = createBranchCylinder(startPoint, endPoint, radius, radiusEnd);
            treeGroup.add(branch);

            if (depth > 0) {
                // Generate 2 to 3 sub-branches
                const numBranches = Math.random() > 0.3 ? 3 : 2;
                
                for (let i = 0; i < numBranches; i++) {
                    // Randomize new direction
                    const angleVariance = 0.6 + (Math.random() * 0.4); // Spread
                    const newDirection = direction.clone();
                    
                    // Apply random rotation to spread branches
                    const axis = new THREE.Vector3(
                        Math.random() - 0.5,
                        Math.random() - 0.5,
                        Math.random() - 0.5
                    ).normalize();
                    
                    newDirection.applyAxisAngle(axis, angleVariance).normalize();
                    
                    // Force branches to generally point somewhat upwards to look like a tree
                    if (newDirection.y < 0) newDirection.y *= -0.5; 
                    newDirection.normalize();

                    const newLength = length * (0.7 + Math.random() * 0.2);
                    
                    buildTree(endPoint, newDirection, newLength, radiusEnd, depth - 1);
                }
            } else {
                // End of the branch, save position to spawn leaves
                leafSpawnPoints.push(endPoint);
            }
        }

        function spawnLeaves() {
            const leafGeometry = new THREE.PlaneGeometry(10, 2.5); // Larger planes for readability

            leafSpawnPoints.forEach(point => {
                // Create a much larger cluster of leaves (12-20 instead of 4-6)
                const clusterSize = 12 + Math.floor(Math.random() * 8);
                
                for (let i = 0; i < clusterSize; i++) {
                    const material = leafMaterials[Math.floor(Math.random() * leafMaterials.length)];
                    const leaf = new THREE.Mesh(leafGeometry, material);
                    
                    // Wider random offset around the branch tip to accommodate more leaves
                    const offset = new THREE.Vector3(
                        (Math.random() - 0.5) * 8,
                        (Math.random() - 0.5) * 8,
                        (Math.random() - 0.5) * 8
                    );
                    
                    leaf.position.copy(point).add(offset);
                    
                    // Controlled initial rotation for readability (avoids edge-on viewing)
                    leaf.rotation.set(
                        (Math.random() - 0.5) * 0.8, // Slight tilt up/down
                        Math.random() * Math.PI * 2, // 360 degrees around the Y axis
                        (Math.random() - 0.5) * 0.8  // Slight roll
                    );

                    // Allow shadows
                    leaf.castShadow = true;
                    leaf.receiveShadow = false;

                    treeGroup.add(leaf);

                    // Store animation data
                    activeLeaves.push({
                        mesh: leaf,
                        basePos: leaf.position.clone(),
                        baseRot: leaf.rotation.clone(),
                        // Wind physics parameters
                        windSpeed: 0.001 + Math.random() * 0.002,
                        windPhaseX: Math.random() * Math.PI * 2,
                        windPhaseY: Math.random() * Math.PI * 2,
                        windPhaseZ: Math.random() * Math.PI * 2,
                        windStrength: 0.1 + Math.random() * 0.2,
                        // Growth parameters
                        growing: true,
                        scale: 0.01 // Start tiny
                    });
                }
            });
        }

        // Initialize the tree (Depth 5 creates a detailed, realistic volume)
        const startPos = new THREE.Vector3(0, 0, 0);
        const initialDir = new THREE.Vector3(0, 1, 0);
        buildTree(startPos, initialDir, 16, 2.5, 5);
        spawnLeaves();

        // Hide loading screen once generated
        loadingScreen.style.opacity = '0';

        // Mouse rotation tracking
        let mouseX = 0;
        let mouseY = 0;
        let targetRotationX = 0;
        let targetRotationY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX) * 0.001;
            mouseY = (event.clientY - windowHalfY) * 0.001;
        });

        // Touch support for mobile
        document.addEventListener('touchmove', (event) => {
            if(event.touches.length > 0) {
                mouseX = (event.touches[0].clientX - windowHalfX) * 0.002;
                mouseY = (event.touches[0].clientY - windowHalfY) * 0.002;
            }
        }, { passive: true });

        // Window resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();
            const delta = clock.getDelta();

            // Smoothly rotate the entire tree based on mouse position
            targetRotationY = mouseX * 2;
            targetRotationX = mouseY * 0.5; // Limit vertical rotation
            
            treeGroup.rotation.y += (targetRotationY - treeGroup.rotation.y) * 0.05;
            treeGroup.rotation.x += (targetRotationX - treeGroup.rotation.x) * 0.05;

            // 1. Process Active Leaves (Wind and Growth)
            for (let i = 0; i < activeLeaves.length; i++) {
                const leafData = activeLeaves[i];

                // Growth logic to maintain volume seamlessly
                if (leafData.growing) {
                    leafData.scale += 0.02; // Grow quickly
                    if (leafData.scale >= 1.0) {
                        leafData.scale = 1.0;
                        leafData.growing = false;
                    }
                    leafData.mesh.scale.set(leafData.scale, leafData.scale, leafData.scale);
                }

                // Wind (swaying) logic
                const t = elapsedTime * 1000 * leafData.windSpeed;
                leafData.mesh.rotation.x = leafData.baseRot.x + Math.sin(t + leafData.windPhaseX) * leafData.windStrength;
                leafData.mesh.rotation.y = leafData.baseRot.y + Math.cos(t + leafData.windPhaseY) * leafData.windStrength;
                leafData.mesh.rotation.z = leafData.baseRot.z + Math.sin(t + leafData.windPhaseZ) * (leafData.windStrength * 0.5);

                // Random chance to fall (only if fully grown)
                // This ensures continuous falling, but volume is maintained by immediate regrowth
                if (!leafData.growing && Math.random() < 0.0003) {
                    
                    // Create a clone for the falling effect
                    const fallingMesh = leafData.mesh.clone();
                    scene.add(fallingMesh); // Add to global scene so it ignores tree rotation
                    
                    // Get global position of the leaf before it detaches
                    const globalPos = new THREE.Vector3();
                    leafData.mesh.getWorldPosition(globalPos);
                    fallingMesh.position.copy(globalPos);

                    fallingLeaves.push({
                        mesh: fallingMesh,
                        velocityX: (Math.random() - 0.5) * 0.1,
                        velocityY: -0.1 - Math.random() * 0.1, // Gravity
                        velocityZ: (Math.random() - 0.5) * 0.1,
                        rotSpeedX: (Math.random() - 0.5) * 0.1,
                        rotSpeedY: (Math.random() - 0.5) * 0.1,
                        rotSpeedZ: (Math.random() - 0.5) * 0.1
                    });

                    // Instantly reset the active leaf to scale 0 so it starts "growing" back immediately
                    // This is the core trick: The tree's volume NEVER decreases, but leaves appear to fall continuously
                    leafData.scale = 0.01;
                    leafData.growing = true;
                    leafData.mesh.scale.set(0.01, 0.01, 0.01);
                }
            }

            // 2. Process Falling Leaves (Gravity and removal)
            for (let i = fallingLeaves.length - 1; i >= 0; i--) {
                const fallData = fallingLeaves[i];
                
                // Add gentle wind drift while falling
                fallData.velocityX += Math.sin(elapsedTime * 2) * 0.005;

                // Update position
                fallData.mesh.position.x += fallData.velocityX;
                fallData.mesh.position.y += fallData.velocityY;
                fallData.mesh.position.z += fallData.velocityZ;

                // Update rotation (tumbling)
                fallData.mesh.rotation.x += fallData.rotSpeedX;
                fallData.mesh.rotation.y += fallData.rotSpeedY;
                fallData.mesh.rotation.z += fallData.rotSpeedZ;

                // Remove when it hits the ground/goes out of view
                if (fallData.mesh.position.y < -5) {
                    scene.remove(fallData.mesh);
                    fallData.mesh.geometry.dispose(); // Cleanup
                    fallingLeaves.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        // Start animation loop
        animate();

    </script>
</body>
</html>
